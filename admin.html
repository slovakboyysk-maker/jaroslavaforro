<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>

body{
background:#111;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.login{

background:#1f1f1f;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.5);

}

input{

width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;

}

button{

width:100%;
padding:14px;
background:gold;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;

}

button:hover{

background:#d4af37;

}

</style>

</head>

<body>

<div class="login">

<h1>Admin Login</h1>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">

Login

</button>

</div>

<script>

const PASSWORD="Jaroslava2025";

function login(){

const password=document.getElementById("password").value;

if(password===PASSWORD){

localStorage.setItem("admin","true");

window.location.href="dashboard.html";

}else{

alert("Wrong password");

}

}

</script>

</body>
</html>
</div>

</body>
</html>
