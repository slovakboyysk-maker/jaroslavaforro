<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Jaroslava Forro Photography</title>

<link rel="stylesheet" href="css/style.css">

<style>

.dashboard-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:25px;
margin-top:30px;
}

.card{
background:#1f1f1f;
padding:25px;
border-radius:12px;
}

.card h2{
margin-bottom:20px;
color:gold;
}

.photo-item,
.review-item{
background:#2a2a2a;
padding:15px;
margin-top:15px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.photo-item button,
.review-item button{
margin-left:10px;
}

.logout{
position:fixed;
top:20px;
right:20px;
background:#c62828;
color:white;
}

textarea{
height:120px;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("admin")!="true"){
window.location.href="admin.html";
}

function logout(){

localStorage.removeItem("admin");

window.location.href="admin.html";

}

</script>

<button class="logout" onclick="logout()">

Logout

</button>

<header>

<h1>Jaroslava Forro Photography</h1>

<p>Admin Dashboard</p>

<nav>

<a href="index.html">Home</a>

<a href="gallery.html">Gallery</a>

<a href="reviews.html">Reviews</a>

</nav>

</header>

<div class="container">

<div class="dashboard-grid">

<!-- Upload -->

<div class="card">

<h2>📷 Upload Photo</h2>

<input type="file" id="photoImage" accept="image/*">
<textarea
id="photoCaption"
placeholder="Caption"></textarea>

<input
id="photoImage"
placeholder="Image URL">

<button onclick="addPhoto()">

Upload Photo

</button>

</div>

<!-- Gallery -->

<div class="card">

<h2>🖼 Gallery Manager</h2>

<div id="galleryList">

<div class="photo-item">

<div>

<strong>Example Portrait</strong>

<br>

Golden Hour

</div>

<div>

<button>Edit</button>

<button style="background:red;color:white;">

Delete

</button>

</div>

</div>

</div>

</div>

<!-- Reviews -->

<div class="card">

<h2>⭐ Reviews</h2>

<div id="reviewList">

<div class="review-item">

<div>

★★★★★

<br>

Amazing Photographer!

</div>

<div>

<button style="background:red;color:white;">

Delete

</button>

</div>

</div>

</div>

</div>

<!-- Contact -->

<div class="card">

<h2>📞 Contact</h2>

<input placeholder="Email">

<input placeholder="Phone Number">

<input placeholder="Instagram">

<input placeholder="Facebook">

<button>

Save Contact

</button>

</div>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
