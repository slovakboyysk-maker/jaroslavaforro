<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
border-bottom:3px solid gold;
}

header h1{
font-size:38px;
}

.container{
width:90%;
max-width:1200px;
margin:40px auto;
}

.card{
background:#1f1f1f;
padding:25px;
border-radius:12px;
margin-bottom:30px;
box-shadow:0 0 15px rgba(0,0,0,.4);
}

.card h2{
margin-bottom:20px;
color:gold;
}

input,
textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
padding:12px 20px;
background:gold;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
margin-top:10px;
}

button:hover{
background:#d4af37;
}

.photo{
background:#2a2a2a;
padding:15px;
border-radius:8px;
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logout{
position:fixed;
top:20px;
right:20px;
background:red;
color:white;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("admin")!="true"){
window.location.href="admin.html";
}

function logout(){
localStorage.removeItem("admin");
window.location.href="admin.html";
}

</script>

<button class="logout" onclick="logout()">
Logout
</button>

<header>

<h1>Jaroslava Forro Photography</h1>

<p>Admin Dashboard</p>

</header>

<div class="container">

<div class="card">

<h2>📷 Upload New Photo</h2>

<input type="file">

<input type="text" placeholder="Person's Name">

<textarea placeholder="Photo Caption"></textarea>

<button>Upload Photo</button>

</div>

<div class="card">

<h2>🖼 Gallery Manager</h2>

<div class="photo">

<div>

<strong>Emma</strong><br>

Golden Hour Portrait

</div>

<div>

<button>Edit</button>

<button style="background:red;color:white;">Delete</button>

</div>

</div>

<div class="photo">

<div>

<strong>Daniel</strong><br>

Outdoor Session

</div>

<div>

<button>Edit</button>

<button style="background:red;color:white;">Delete</button>

</div>

</div>

</div>

<div class="card">

<h2>⭐ Reviews</h2>

<div class="photo">

<div>

★★★★★<br>

Amazing photographer!

</div>

<div>

<button style="background:red;color:white;">Delete</button>

</div>

</div>

</div>

<div class="card">

<h2>📞 Contact Information</h2>

<input placeholder="Email">

<input placeholder="Phone">

<input placeholder="Instagram">

<input placeholder="Facebook">

<button>Save Contact Info</button>

</div>

</div>

</body>
</html>
