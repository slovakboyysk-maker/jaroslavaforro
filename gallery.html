<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Jaroslava Forro Photography</title>

<link rel="stylesheet" href="css/style.css">

<style>

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
margin-top:40px;
}

.photo-card{
background:#1f1f1f;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,.4);
transition:.3s;
}

.photo-card:hover{
transform:translateY(-5px);
}

.photo-card img{
width:100%;
height:320px;
object-fit:cover;
cursor:pointer;
}

.photo-info{
padding:20px;
}

.photo-info h3{
color:gold;
margin-bottom:10px;
}

.photo-info p{
color:#ddd;
}

/* Lightbox */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:999;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.close{
position:absolute;
top:30px;
right:40px;
font-size:45px;
color:white;
cursor:pointer;
}

.empty{
text-align:center;
padding:80px;
color:#aaa;
font-size:22px;
}

</style>

</head>

<body>

<header>

<h1>Jaroslava Forro Photography</h1>

<p>Photography Gallery</p>

<nav>

<a href="index.html">Home</a>

<a href="gallery.html">Gallery</a>

<a href="reviews.html">Reviews</a>

<a href="contact.html">Contact</a>

</nav>

</header>

<div class="container">

<h2 style="text-align:center;color:gold;">
Gallery
</h2>

<div id="gallery" class="gallery"></div>

</div>

<div id="lightbox" class="lightbox">

<span class="close" onclick="closeImage()">&times;</span>

<img id="lightboxImage">

</div>

<script>

let photos = JSON.parse(localStorage.getItem("photos")) || [];

const gallery=document.getElementById("gallery");

if(photos.length===0){

gallery.innerHTML=`

<div class="empty">

No photos have been uploaded yet.

</div>

`;

}else{

photos.forEach(photo=>{

gallery.innerHTML+=`

<div class="photo-card">

<img
src="${photo.image}"
onclick="openImage('${photo.image}')">

<div class="photo-info">

<h3>${photo.name}</h3>

<p>${photo.caption}</p>

</div>

</div>

`;

});

}

function openImage(src){

document.getElementById("lightbox").style.display="flex";

document.getElementById("lightboxImage").src=src;

}

function closeImage(){

document.getElementById("lightbox").style.display="none";

}

</script>

</body>
</html>
</script>

</body>
</html>
